<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>谈单助手</title>
<style>
:root {
  --p: #4F46E5; --pl: #EEF2FF; --pd: #3730A3;
  --bg: #F8FAFC; --card: #fff; --t: #1E293B; --ts: #64748B; --tm: #94A3B8;
  --b: #E2E8F0; --r: 14px; --rs: 8px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--t); -webkit-tap-highlight-color:transparent; }
.header { background:linear-gradient(135deg,#4F46E5,#7C3AED,#A855F7); padding:20px 16px 16px; color:#fff; position:sticky; top:0; z-index:100; }
.header h1 { font-size:1.3rem; font-weight:700; letter-spacing:-0.3px; }
.header .sub { font-size:0.75rem; opacity:0.85; margin-top:2px; }
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:12px 12px 0; }
.stat { background:#fff; border-radius:10px; padding:12px 8px; text-align:center; border:1px solid var(--b); position:relative; overflow:hidden; }
.stat::before { content:''; position:absolute; left:0;top:0;width:3px;height:100%;border-radius:2px 0 0 2px; }
.stat.s0::before { background:#3B82F6; } .stat.s1::before { background:#8B5CF6; }
.stat.s2::before { background:#F59E0B; } .stat.s3::before { background:#10B981; }
.stat .n { font-size:1.3rem; font-weight:800; } .stat .l { font-size:0.6rem; color:var(--ts); margin-top:2px; }
.filters { padding:10px 12px; display:flex; flex-wrap:wrap; gap:6px; }
.filters select, .filters input { padding:8px 10px; border:1px solid var(--b); border-radius:8px; font-size:0.78rem; background:#fff; color:var(--t); min-width:70px; }
.filters button { padding:8px 16px; border:none; border-radius:8px; font-weight:600; font-size:0.78rem; cursor:pointer; white-space:nowrap; }
.btn-search { background:linear-gradient(135deg,#4F46E5,#7C3AED); color:#fff; }
.btn-reset { background:#fff; color:var(--t); border:1px solid var(--b); }
.cat-header { display:flex; align-items:center; gap:8px; padding:18px 12px 8px; border-bottom:2px solid var(--b); margin:0 12px; }
.cat-dot { width:8px; height:8px; border-radius:50%; }
.cat-title { font-weight:700; font-size:0.9rem; }
.cat-count { background:#F1F5F9; color:var(--ts); padding:2px 10px; border-radius:12px; font-size:0.65rem; font-weight:600; }
.results { padding:8px 12px 60px; }
.result-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
.card { background:#fff; border-radius:var(--r); border:1px solid var(--b); overflow:hidden; transition:transform 0.15s,box-shadow 0.15s; }
.card:active { transform:scale(0.98); }
.card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.08); }
.card-thumb { width:100%; height:110px; background:#F1F5F9; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.card-thumb img { width:100%; height:100%; object-fit:cover; }
.card-badge { position:absolute; top:6px; right:6px; padding:2px 7px; border-radius:8px; font-size:0.55rem; font-weight:700; color:#fff; text-transform:uppercase; }
.b-png,.b-jpg,.b-jpeg { background:#3B82F6; } .b-pdf { background:#EF4444; }
.b-xlsx,.b-xls { background:#10B981; } .b-pptx,.b-ppt { background:#F97316; }
.card-body { padding:8px 10px; }
.card-name { font-weight:600; font-size:0.72rem; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; word-break:break-all; }
.card-meta { font-size:0.62rem; color:var(--tm); margin:3px 0 6px; }
.card-open { display:block; text-align:center; padding:7px 0; border-radius:6px; background:linear-gradient(135deg,#4F46E5,#7C3AED); color:#fff; font-weight:600; font-size:0.72rem; text-decoration:none; margin:0 10px 10px; }
.empty { text-align:center; padding:60px 20px; color:var(--ts); }
.empty .icon { font-size:3rem; margin-bottom:12px; }
.empty h2 { font-size:1.1rem; margin-bottom:6px; }
.tip-box { background:#EEF2FF; border-radius:8px; padding:10px 14px; margin:4px 12px 12px; font-size:0.75rem; color:var(--p); }
@media(min-width:768px){ .result-grid { grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); } .header { padding:24px 24px 20px; } .filters { padding:10px 24px; } .results { padding:8px 24px 60px; } .stats { padding:12px 24px 0; } .cat-header { margin:0 24px; } }
@media(min-width:1024px){ .result-grid { grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); } }
</style>
</head>
<body>

<div class="header">
  <h1>谈单助手</h1>
  <div class="sub">课程物料 · 话术辅助 · 快速检索</div>
</div>

<div class="stats" id="stats"></div>

<div class="filters">
  <select id="fGrade" onchange="doSearch()"><option value="">全部年级</option></select>
  <select id="fSubject" onchange="doSearch()"><option value="">全部科目</option></select>
  <select id="fType" onchange="doSearch()"><option value="">全部(线上/线下)</option></select>
  <select id="fSemester" onchange="doSearch()"><option value="">全部学期</option></select>
  <input id="fTeacher" placeholder="老师姓名" style="flex:0.5;min-width:80px;" oninput="doSearch()">
  <button class="btn-reset" onclick="resetFilters()">重置</button>
  <button class="btn-search" onclick="doSearch()">搜索</button>
</div>

<div class="results" id="results">
  <div class="empty"><div class="icon">📘</div><h2>选择筛选条件后点击搜索</h2><p>或直接点"搜索"查看全部资源</p></div>
</div>

<script>
let catalog = null;
const GRADES = ['初一','初二','初三'];
const SUBJECTS = ['博文','双语','托管','实验P','实验C'];
const TYPES = ['线上','线下'];
const SEMESTERS = ['暑秋','寒春'];
const CAT_COLORS = {'课表':'#3B82F6','课程大纲':'#8B5CF6','老师介绍':'#F59E0B','政策':'#EF4444','优惠价格':'#10B981'};
const CAT_ICONS = {'课表':'🗓️','课程大纲':'📖','老师介绍':'👨‍🏫','政策':'📋','优惠价格':'💰'};

fetch('https://raw.githubusercontent.com/minglinhe8-prog/tandan-helper/master/catalog.json').then(r => r.json()).then(data => {
    catalog = data;
    initFilters();
    showStats();
}).catch(() => {
    document.getElementById('results').innerHTML = '<div class="empty"><div class="icon">⚠️</div><h2>加载失败</h2></div>';
});

function initFilters() {
    const g = document.getElementById('fGrade');
    GRADES.forEach(v => { const o = document.createElement('option'); o.value=v; o.textContent=v; g.appendChild(o); });
    const s = document.getElementById('fSubject');
    SUBJECTS.forEach(v => { const o = document.createElement('option'); o.value=v; o.textContent=v; s.appendChild(o); });
    const t = document.getElementById('fType');
    TYPES.forEach(v => { const o = document.createElement('option'); o.value=v; o.textContent=v; t.appendChild(o); });
    const sem = document.getElementById('fSemester');
    SEMESTERS.forEach(v => { const o = document.createElement('option'); o.value=v; o.textContent=v; sem.appendChild(o); });
}

function showStats() {
    if (!catalog) return;
    const cats = catalog.categories;
    const n1 = (cats['课表']||[]).length;
    const n2 = (cats['课程大纲']||[]).length;
    const n3 = (cats['老师介绍']||[]).length + (cats['政策']||[]).length + (cats['优惠价格']||[]).length;
    document.getElementById('stats').innerHTML =
        `<div class="stat s0"><div class="n">${n1}</div><div class="l">课表文件</div></div>
         <div class="stat s1"><div class="n">${n2}</div><div class="l">课程大纲</div></div>
         <div class="stat s2"><div class="n">${n3}</div><div class="l">师资·政策·优惠</div></div>
         <div class="stat s3"><div class="n">就绪</div><div class="l">数据状态</div></div>`;
}

function matchAny(text, values) {
    if (!values) return true;
    return values.split(',').some(v => v.trim() && text.includes(v.trim()));
}

function doSearch() {
    if (!catalog) return;
    const grade = document.getElementById('fGrade').value;
    const subject = document.getElementById('fSubject').value;
    const type = document.getElementById('fType').value;
    const semester = document.getElementById('fSemester').value;
    const teacher = document.getElementById('fTeacher').value.trim();

    let html = '';
    let totalFound = 0;

    for (const [catName, files] of Object.entries(catalog.categories)) {
        let filtered = files;

        // 按类别分层过滤
        if (catName === '课表') {
            // 课表: 年级 + 线上/线下 + 学期
            if (grade) filtered = filtered.filter(f => f.grade === grade || f.name.includes(grade));
            if (type) filtered = filtered.filter(f => f.type === type);
            if (semester) filtered = filtered.filter(f => f.name.includes(semester));
        } else if (catName === '课程大纲') {
            // 大纲: 年级 + 科目 + 线上/线下, 不按学期、不按老师
            if (grade) filtered = filtered.filter(f => f.grade === grade || (f.parent_dirs||[]).some(d=>d.includes(grade)) || f.name.includes(grade));
            if (subject) filtered = filtered.filter(f => (f.subject||'') === subject || f.name.includes(subject));
            if (type) filtered = filtered.filter(f => f.type === type);
        } else if (catName === '老师介绍') {
            // 老师: 科目 + 老师名
            if (subject) filtered = filtered.filter(f => (f.subject||'') === subject || f.name.includes(subject));
            if (teacher) filtered = filtered.filter(f => f.name.includes(teacher));
            if (grade) filtered = filtered; // 老师不按年级过滤
        } else if (catName === '政策') {
            // 政策: 年级
            if (grade) filtered = filtered.filter(f => f.name.includes(grade));
        } else if (catName === '优惠价格') {
            // 优惠: 年级
            if (grade) filtered = filtered.filter(f => f.name.includes(grade));
        }

        if (filtered.length === 0) continue;
        totalFound += filtered.length;

        const color = CAT_COLORS[catName] || '#64748B';
        const icon = CAT_ICONS[catName] || '📁';
        html += `<div class="cat-header">
          <div class="cat-dot" style="background:${color}"></div>
          <span>${icon}</span>
          <div class="cat-title">${catName}</div>
          <div class="cat-count">${filtered.length} 个</div>
        </div><div class="result-grid">`;

        filtered.forEach(f => {
            const url = f.cdn_url || f.raw_url || f.url;
            const isImg = ['png','jpg','jpeg','gif','bmp'].includes(f.ext);
            const isOffice = ['pptx','ppt','xlsx','xls'].includes(f.ext);

            // 微软 Office Online 在线预览（需要公网可访问的URL）
            let openUrl = url;
            let openLabel = '打开';
            let openAttr = 'target="_blank"';
            if (f.is_link) {
                openLabel = '🌐 在线文档';
            }

            const thumb = isImg ? `<img src="${url}" loading="lazy" alt="${f.name}" onerror="this.parentElement.innerHTML='<span style=font-size:2rem>🖼️</span>'">` :
                `<div style="font-size:2rem;">${f.ext==='pdf'?'📄':isOffice?'📽️':'📁'}</div>`;

            let tags = [];
            if (f.grade) tags.push(f.grade);
            if (f.type) tags.push(f.type);
            if (f.subject) tags.push(f.subject);

            html += `<div class="card">
            <div class="card-thumb">
              ${thumb}
              <span class="card-badge b-${f.ext}">${f.ext.toUpperCase()}</span>
            </div>
            <div class="card-body">
              <div class="card-name">${f.name}</div>
              ${tags.length ? `<div class="card-meta">${tags.join(' · ')}</div>` : `<div class="card-meta">${f.size_kb} KB</div>`}
            </div>
            <a class="card-open" href="${openUrl}" ${openAttr}>${openLabel}</a>
          </div>`;
        });
        html += '</div>';
    }

    if (!totalFound) {
        html = '<div class="empty"><div class="icon">🔍</div><h2>未找到匹配资源</h2><p>试试调整筛选条件</p></div>';
    } else {
        html = `<div class="tip-box">找到 ${totalFound} 个资源 — 点击卡片「打开」直接查看</div>` + html;
    }

    document.getElementById('results').innerHTML = html;
}

function resetFilters() {
    document.getElementById('fGrade').value = '';
    document.getElementById('fSubject').value = '';
    document.getElementById('fType').value = '';
    document.getElementById('fSemester').value = '';
    document.getElementById('fTeacher').value = '';
    doSearch();
}

setTimeout(() => { if (catalog) doSearch(); }, 500);
</script>

</body>
</html>
